<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle de Chips</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Inclusão do Chart.js -->
</head>
<body>
    <div class="container">
        <header>
            <h1>Painel de Controle de Chips</h1>
        </header>

        <section id="whatsapp">
            <div class="chip">
                <h2>WhatsApp 1</h2>
                <p>Status: <span id="status-1">Ativo</span></p>
                <button onclick="pausar(1)">Pausar</button>
                <button onclick="definirIntervalo(1)">Definir Intervalo</button>
            </div>

            <div class="chip">
                <h2>WhatsApp 2</h2>
                <p>Status: <span id="status-2">Ativo</span></p>
                <button onclick="pausar(2)">Pausar</button>
                <button onclick="definirIntervalo(2)">Definir Intervalo</button>
            </div>

            <div class="chip">
                <h2>WhatsApp 3</h2>
                <p>Status: <span id="status-3">Em Pausa</span></p>
                <button onclick="retomar(3)">Retomar</button>
                <button onclick="definirIntervalo(3)">Definir Intervalo</button>
            </div>
        </section>

        <section id="grafico">
            <h2>Gráfico de Maturação</h2>
            <canvas id="myChart"></canvas>
        </section>
    </div>

    <script src="script.js"></script> <!-- Inclusão do arquivo de script -->
</body>
</html>
