<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle de Chips</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Painel de Controle de Chips</h1>
    <div class="container">
        <!-- WhatsApp 1 -->
        <div class="card">
            <h2>WhatsApp 1</h2>
            <p class="status">Status: Ativo</p>
            <button>Pausar</button>
            <button>Definir Intervalo</button>
        </div>
        <!-- WhatsApp 2 -->
        <div class="card">
            <h2>WhatsApp 2</h2>
            <p class="status">Status: Ativo</p>
            <button>Pausar</button>
            <button>Definir Intervalo</button>
        </div>
        <!-- WhatsApp 3 -->
        <div class="card">
            <h2>WhatsApp 3</h2>
            <p class="status">Status: Em Pausa</p>
            <button>Retomar</button>
            <button>Definir Intervalo</button>
        </div>
        <!-- Gráfico -->
        <div id="chart-container">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
